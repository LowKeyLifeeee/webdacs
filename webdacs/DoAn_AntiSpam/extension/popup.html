<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti-Spam Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #0f172a;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
      width: 360px;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: #f8fafc;
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      font-size: 28px;
      filter: drop-shadow(0 0 8px var(--primary));
    }

    .header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Status Card */
    .status-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 24px;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }

    .status-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }

    .status-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status-desc {
      font-size: 13px;
      color: #94a3b8;
    }

    /* Analysis Details */
    .details-section {
      display: none;
      margin-top: 16px;
      text-align: left;
    }

    .details-title {
      font-size: 14px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .reason-item {
      font-size: 12px;
      color: #94a3b8;
      background: rgba(255, 255, 255, 0.03);
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      border-left: 2px solid var(--primary);
    }

    /* Input Area */
    .input-group {
      margin-top: 24px;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px;
      color: white;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #64748b;
    }

    /* Variations */
    .status-safe { border-color: var(--success); }
    .status-safe .status-text { color: var(--success); }
    .status-warning { border-color: var(--warning); }
    .status-warning .status-text { color: var(--warning); }
    .status-dangerous { border-color: var(--danger); }
    .status-dangerous .status-text { color: var(--danger); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo-icon">🛡️</span>
      <h2>Anti-Spam Pro</h2>
    </div>

    <!-- Tabs -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <button id="homeTab" style="flex: 1; padding: 8px; font-size: 13px; background: var(--glass); border: 1px solid var(--glass-border);">🛡️ Bảo vệ</button>
      <button id="historyTab" style="flex: 1; padding: 8px; font-size: 13px; background: transparent; border: 1px solid var(--glass-border);">🕒 Lịch sử</button>
    </div>

    <div id="homeView">
      <!-- Website Status (Dynamic) -->
      <div id="siteStatusCard" class="status-card">
        <span id="siteIcon" class="status-icon">🌐</span>
        <div id="siteStatusText" class="status-text">Đang phân tích trang...</div>
        <div id="siteStatusDesc" class="status-desc">Vui lòng đợi giây lát</div>
        
        <div id="analysisDetails" class="details-section">
          <div class="details-title">🔍 Chi tiết phân tích:</div>
          <div id="reasonsList"></div>
        </div>

        <!-- Whitelist / Blacklist Actions -->
        <div style="display: flex; gap: 8px; margin-top: 16px;">
          <button id="whitelistBtn" style="flex: 1; padding: 6px; font-size: 11px; background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success);">🛡️ Tin tưởng</button>
          <button id="blacklistBtn" style="flex: 1; padding: 6px; font-size: 11px; background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger);">🚫 Chặn trang</button>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">

      <!-- Manual Text Check -->
      <div class="input-group">
        <div class="details-title">⌨️ Kiểm tra tin nhắn nhanh:</div>
        <textarea id="textInput" placeholder="Dán nội dung tin nhắn nghi ngờ vào đây..."></textarea>
        <button id="checkBtn">Phân tích bằng AI</button>
      </div>

      <div id="manualResult" style="margin-top: 15px; display: none;">
        <div class="status-card" style="padding: 12px; font-size: 14px;">
          <span id="manualStatusText"></span>
        </div>
      </div>
    </div>

    <!-- History View -->
    <div id="historyView" style="display: none;">
      <div class="details-title">🕒 Các trang đã quét gần đây:</div>
      <div id="historyList" style="max-height: 250px; overflow-y: auto;">
        <!-- History items will be injected here -->
      </div>
    </div>

    <div class="footer">
      AI Powered Protection • Version 2.0
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
